<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Content Portal</title>
    <link rel="stylesheet" href="../css/teacherdasboard.css">
</head>
<body>

<header class="topbar">
    <a class="logo" href="#">TCP<span>/</span></a>
    <div class="divider-v"></div>
    <nav class="breadcrumb" id="breadcrumb">
        <a href="#" onclick="goHome(); return false;">Home</a>
        <span class="sep"> / </span>
        <span>All Resources</span>
    </nav>
    <div class="topbar-right">
        <div class="search">
            <svg width="14" height="14" fill="none" stroke="#999" stroke-width="1.5" viewBox="0 0 16 16">
                <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5 L14 14" stroke-linecap="round"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search folders and files…" oninput="handleSearch()">
        </div>
        <button class="btn-present">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                <rect x="1" y="2" width="14" height="9" rx="1.5"/><path d="M5 14L8 11L11 14"/>
            </svg>
            Present
        </button>
        <div class="avatar">MT</div>
    </div>
</header>

<div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <div class="s-section">
            <span class="s-label">Library</span>
            <a class="s-item active" onclick="filterType('all', this)">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                    <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
                    <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
                </svg>
                All Resources <span class="s-count" id="cnt-all">0</span>
            </a>
            <a class="s-item" onclick="filterType('Slideshow', this)">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                    <rect x="1" y="2" width="14" height="9" rx="1.5"/><path d="M5 14L8 11L11 14"/>
                </svg>
                Slideshows <span class="s-count" id="cnt-slide">0</span>
            </a>
            <a class="s-item" onclick="filterType('Worksheet', this)">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                    <path d="M3 2H10L13 5V14H3Z"/><path d="M10 2V5H13"/><path d="M5 8H11M5 10.5H9"/>
                </svg>
                Worksheets <span class="s-count" id="cnt-ws">0</span>
            </a>
            <a class="s-item" onclick="filterType('Quiz', this)">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                    <circle cx="8" cy="8" r="7"/><path d="M5 8L7 10L11 6"/>
                </svg>
                Quizzes <span class="s-count" id="cnt-quiz">0</span>
            </a>
        </div>
    </aside>

    <main class="main">

        <div class="toolbar">
            <button class="btn-add" onclick="openFolderModal()">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 16 16">
                    <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2H6l2 2h5.5A1.5 1.5 0 0 1 15 5.5v7A1.5 1.5 0 0 1 13.5 14h-11A1.5 1.5 0 0 1 1 12.5Z"/>
                    <path d="M8 6V10M6 8H10"/>
                </svg>
                New Folder
            </button>
            <button class="btn-add" onclick="openFileModal()">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 16 16">
                    <path d="M4 2H10L13 5V14H4Z"/><path d="M10 2V5H13"/>
                    <path d="M8 7V11M6 9H10"/>
                </svg>
                New File
            </button>
            <span class="toolbar-info" id="toolbarInfo">0 folders · 0 files</span>
        </div>

        <div class="section-head" id="folderHead">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2H6l2 2h5.5A1.5 1.5 0 0 1 15 5.5v7A1.5 1.5 0 0 1 13.5 14h-11A1.5 1.5 0 0 1 1 12.5Z"/>
            </svg>
            <span id="folderHeadLabel">Folders — 0</span>
        </div>

        <div class="folder-grid" id="folderGrid">
            <!-- folders injected here -->
            <div class="folder-add" id="addFolderCard" onclick="openFolderModal()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                    <circle cx="8" cy="8" r="7"/><path d="M8 5V11M5 8H11"/>
                </svg>
                <span>New folder</span>
            </div>
        </div>

        <div class="section-head">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                <path d="M4 2H10L13 5V14H4Z"/><path d="M10 2V5H13"/>
            </svg>
            <span id="fileHeadLabel">Files — 0</span>
        </div>

        <div class="file-list">
            <div class="file-header">
                <span class="col-icon"></span>
                <span class="col-name">Name</span>
                <span class="col-desc">Description</span>
                <span class="col-right">
          <span class="col-type">Type</span>
          <span class="col-auth">Author</span>
          <span class="col-act"></span>
        </span>
            </div>
            <div id="fileList">
            </div>
            <div class="no-results" id="noResults">No results found.</div>
        </div>

    </main>
</div>

<div class="modal-overlay" id="folderModal">
    <div class="modal">
        <h3>New Folder</h3>
        <label>Folder name</label>
        <input type="text" id="folderNameInput" placeholder="e.g. Mathematics" maxlength="40">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('folderModal')">Cancel</button>
            <button class="btn-confirm" onclick="confirmAddFolder()">Create</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="fileModal">
    <div class="modal">
        <h3>New File</h3>
        <label>File name</label>
        <input type="text" id="fileNameInput" placeholder="e.g. Intro to Algebra" maxlength="60">
        <label>Description</label>
        <textarea id="fileDescInput" placeholder="Brief description…" maxlength="120"></textarea>
        <label>Type</label>
        <select id="fileTypeInput">
            <option value="Slideshow">Slideshow</option>
            <option value="Worksheet">Worksheet</option>
            <option value="Quiz">Quiz</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('fileModal')">Cancel</button>
            <button class="btn-confirm" onclick="confirmAddFile()">Add File</button>
        </div>
    </div>
</div>

<footer class="statusbar">
    <span><span class="status-dot dot-green"></span>Smart Board Connected</span>
    <span><span class="status-dot dot-blue"></span>Projector Ready</span>
    <span class="status-right">1920 × 1080 · Full HD</span>
</footer>

<script src="../pages/teacherdashboard.html"></script>

</body>
</html>
