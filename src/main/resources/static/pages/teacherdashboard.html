<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/teacherdasboard.css">
</head>

<body>
<div class="page">
    <aside class="side-panel">
        <div class="brand">
            <h1>Teacher Workspace</h1>
            <p>Organize folders, control visibility, and manage academic content flow.</p>
        </div>
        <button class="logout" onclick="logout()">Logout</button>
    </aside>

    <main class="container">
        <section class="top-bar">
            <div>
                <h3>Folder Management</h3>
                <p>Create and publish folders. Open a folder to manage file uploads.</p>
            </div>
            <button onclick="openFolderModal()">Create Folder</button>
        </section>

        <section class="content-panel">
            <div class="panel-title">
                <h4>All Folders</h4>
                <span>Use Files to upload inside folder</span>
            </div>
            <div id="folderList"></div>
        </section>
    </main>
</div>

<div class="modal" id="folderModal">
    <div class="modal-content">
        <h3>Create Folder</h3>

        <input type="text" id="folderName" placeholder="Folder Name">
        <select id="year" required>
            <option value="">Select Year</option>
            <option value="FIRST">First Year</option>
            <option value="SECOND">Second Year</option>
            <option value="THIRD">Third Year</option>
            <option value="FOURTH">Fourth Year</option>
        </select>

        <select id="branch" required>
            <option value="">Select Branch</option>
            <option value="CSE">Computer Science</option>
            <option value="IT">Information Technology</option>
            <option value="EN">Electronics</option>
            <option value="EE">Electrical </option>
            <option value="MECH">Mechanical</option>
            <option value="CIVIL">Civil</option>
        </select>

        <div class="modal-actions">
            <button onclick="createFolder()">Create</button>
            <button class="secondary-btn" onclick="closeFolderModal()">Cancel</button>
        </div>
    </div>
</div>

<div class="modal" id="deleteModal">
    <div class="modal-content small">
        <h3>Delete Folder?</h3>
        <p>This action cannot be undone.</p>

        <div class="modal-actions">
            <button class="danger-btn" onclick="confirmDelete()">Delete</button>
            <button class="secondary-btn" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="../js/teacher.js"></script>
</body>
</html>
