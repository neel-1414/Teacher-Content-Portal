<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="../css/teacherdasboard.css">
</head>

<body>

<header>
    <div class="header-left">
        <h2>Teacher Dashboard</h2>
        <p>Manage folders, upload files, and control student visibility</p>
    </div>

    <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

    <div class="top-bar">
        <div>
            <h3>Folders</h3>
            <p>Create folders and publish them for students</p>
        </div>

        <button onclick="openFolderModal()">Add Folder</button>
    </div>

    <div id="folderList">

        <!-- Example Folder Card -->
        <div class="folder-card">

            <div class="folder-info">
                <h4>Java Notes</h4>
                <p>Third Year • IT</p>
            </div>

            <div class="folder-actions">

                <!-- Toggle -->
                <div class="toggle-box">
                    <label class="switch">
                        <input type="checkbox"
                               checked
                               onchange="toggleFolder(1)">
                        <span class="slider"></span>
                    </label>
                    <span class="status-text">Visible</span>
                </div>

                <button onclick="openUploadModal(1)">Upload</button>
                <button class="danger-btn" onclick="openDeleteModal(1)">Delete</button>

            </div>

        </div>

    </div>

</div>

<!-- Create Folder Modal -->
<div class="modal" id="folderModal">
    <div class="modal-content">
        <h3>Create Folder</h3>

        <input type="text" id="folderName" placeholder="Folder Name">
        <input type="text" id="year" placeholder="Year">
        <input type="text" id="branch" placeholder="Branch">

        <div class="modal-actions">
            <button onclick="createFolder()">Create</button>
            <button class="secondary-btn" onclick="closeFolderModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Upload File Modal -->
<div class="modal" id="uploadModal">
    <div class="modal-content">
        <h3>Upload File</h3>

        <input type="text" id="fileName" placeholder="File Name">
        <input type="file" id="fileInput">

        <div class="modal-actions">
            <button onclick="uploadFile()">Upload</button>
            <button class="secondary-btn" onclick="closeUploadModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal" id="deleteModal">
    <div class="modal-content small">
        <h3>Delete Folder?</h3>
        <p>This action cannot be undone.</p>

        <div class="modal-actions">
            <button class="danger-btn" onclick="confirmDelete()">Delete</button>
            <button class="secondary-btn" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="../js/teacher.js"></script>
</body>
</html>
