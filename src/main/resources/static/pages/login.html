<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Content Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
<div class="bg-orb orb-one"></div>
<div class="bg-orb orb-two"></div>
<div class="card">

    <div class="logo-wrap">
        <img
                src="../media/wce.png"
                alt="Walchand College of Engineering"
                onerror="this.onerror=null;this.src='../../media/wcoe-logo.png';"
        />
    </div>
    <h1>Teacher Content Portal</h1>
    <p class="subtitle">Sign in to continue to your dashboard</p>

    <form id="loginForm">
        <div class="field">
            <label for="userId">User ID</label>
            <div class="input-wrap">
                <input
                        type="text"
                        id="userId"
                        name="userId"
                        placeholder="Enter User ID"
                        autocomplete="username"
                        required
                />
            </div>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter Password"
                        autocomplete="current-password"
                        required
                />
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Show or hide password">Show</button>
            </div>
        </div>
        <p id="error-message"></p>
        <button class="btn" id="loginButton" type="submit">Sign In</button>
    </form>
</div>
<script src="../js/login.js"></script>
</body>
</html>
